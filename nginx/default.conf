limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── Gzip compression ─────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    client_max_body_size 10M;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    index index.php;

    charset utf-8;

    # ─── Static assets cache (1 year, immutable) ───────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # API Backend — rewrite unversioned calls to v1
    location /api {
        limit_req zone=api burst=50 nodelay;
        rewrite ^/api/(?!v[0-9]|health|sanctum)(.*)$ /api/v1/$1 break;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF Cookie
    location /sanctum {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage for images
    location /storage {
        alias /var/www/storage/app/public;
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Filament Admin Panel
    location /filament-admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire Assets and Messages
    location /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s;
        set $backend php-fpm:9000;
        fastcgi_pass $backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    # Frontend Proxy (Next.js)
    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
