limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ─── Gzip compression ─────────────────────────────────────────────────────
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml
    font/woff
    font/woff2;

server {
    listen 80;
    server_name localhost;
    root /var/www/public;
    server_tokens off;

    client_max_body_size 10M;

    index index.php;
    charset utf-8;

    # ─── All Next.js assets → frontend container ─────────────────────────────
    # The standalone Next.js server handles /_next/static/ natively.
    location ^~ /_next/ {
        resolver 127.0.0.11 valid=30s;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        access_log off;
    }

    # ─── API Backend — rewrite unversioned calls to v1 ────────────────────────
    location /api {
        limit_req zone=api burst=50 nodelay;
        rewrite ^/api/(?!v[0-9]|health|sanctum)(.*)$ /api/v1/$1 break;
        try_files $uri $uri/ /index.php?$query_string;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ─── Sanctum CSRF Cookie ──────────────────────────────────────────────────
    location /sanctum {
        limit_req zone=login burst=3 nodelay;
        try_files $uri $uri/ /index.php?$query_string;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ─── Storage for images ───────────────────────────────────────────────────
    location ^~ /storage {
        alias /var/www/storage/app/public;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ─── Filament Admin Panel ─────────────────────────────────────────────────
    location /filament-admin {
        try_files $uri $uri/ /index.php?$query_string;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ─── Livewire Assets ──────────────────────────────────────────────────────
    location /livewire {
        try_files $uri $uri/ /index.php?$query_string;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ─── PHP-FPM ──────────────────────────────────────────────────────────────
    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s;
        set $backend php-fpm:9000;
        fastcgi_pass $backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ─── Frontend (Next.js) — catch-all ───────────────────────────────────────
    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ─── Health check ─────────────────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK";
    }
}
