server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # API Backend — rewrite unversioned calls to v1
    # e.g. /api/config → /api/v1/config, /api/auth/login → /api/v1/auth/login
    # Excludes: /api/v1/... (already versioned), /api/health, /api/sanctum/...
    location /api {
        rewrite ^/api/(?!v[0-9]|health|sanctum)(.*)$ /api/v1/$1 break;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF Cookie — must be before /api to avoid rewrite capture
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage for images
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri =404;
    }

    # Filament Admin Panel
    location /filament-admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Livewire Assets and Messages
    location /livewire {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s;
        set $backend php-fpm:9000;
        fastcgi_pass $backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    # Frontend Proxy (Next.js)
    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # Health check endpoint for load balancers and Docker
    location = /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }
}
