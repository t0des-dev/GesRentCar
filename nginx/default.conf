server {
    listen 80;
    server_name localhost;
    root /var/www/public;

    client_max_body_size 10M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    index index.php;

    charset utf-8;

    # API Backend — rewrite unversioned calls to v1
    # e.g. /api/config → /api/v1/config, /api/auth/login → /api/v1/auth/login
    # Excludes: /api/v1/... (already versioned) and /api/health (no v1 prefix)
    location /api {
        rewrite ^/api/(?!v[0-9]|health)(.*)$ /api/v1/$1 last;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Sanctum CSRF Cookie
    location /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Storage for images
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri =404;
    }

    # PHP-FPM
    location ~ \.php$ {
        resolver 127.0.0.11 valid=30s;
        set $backend backend:9000;
        fastcgi_pass $backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Frontend Proxy (Next.js)
    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend http://frontend:3000;
        proxy_pass $frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
