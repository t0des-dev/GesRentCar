
services:
  # Backend API (PHP-FPM)
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectoria-backend
    restart: always
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=vectoria
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - db
      - redis

  # Queue Worker
  worker:
    build: ./backend
    container_name: vectoria-worker
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - backend

  # Frontend (Next.js Standalone)
  frontend:
    build: ./frontend
    container_name: vectoria-frontend
    restart: always
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost/api
    depends_on:
      - backend

  # Nginx (Reverse Proxy & Static Server)
  web:
    image: nginx:alpine
    container_name: vectoria-web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/storage/app/public:/var/www/storage/app/public
    depends_on:
      - frontend
      - backend

  # Database
  db:
    image: postgres:15-alpine
    container_name: vectoria-db
    restart: always
    environment:
      - POSTGRES_DB=vectoria
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: vectoria-redis
    restart: always

volumes:
  pgdata:
