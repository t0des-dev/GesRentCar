
services:
  # Database — starts first, others wait for healthy status
  db:
    image: postgres:15-alpine
    container_name: gesrentcar-db
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d vectoria"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      - POSTGRES_DB=vectoria
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Redis
  redis:
    image: redis:7-alpine
    container_name: gesrentcar-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend API (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gesrentcar-backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pgrep php-fpm > /dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=vectoria
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Queue Worker
  worker:
    build: ./backend
    container_name: gesrentcar-worker
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=vectoria
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      backend:
        condition: service_healthy

  # Scheduler (cron tasks)
  scheduler:
    build: ./backend
    container_name: gesrentcar-scheduler
    restart: always
    command: >
      sh -c "echo '0 * * * * cd /var/www && php artisan schedule:run >> /dev/null 2>&1' | crontab - && crond -f -L /dev/stdout"
    volumes:
      - ./backend/storage:/var/www/storage
    environment:
      - APP_ENV=production
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=vectoria
      - DB_USERNAME=admin
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - BACKUP_S3_BUCKET=${BACKUP_S3_BUCKET:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-west-1}
      - AWS_ENDPOINT=${AWS_ENDPOINT:-}
    depends_on:
      backend:
        condition: service_healthy

  # Frontend (Next.js Standalone)
  frontend:
    build: ./frontend
    container_name: gesrentcar-frontend
    restart: always
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy

  # Nginx (Reverse Proxy & Static Server)
  web:
    image: nginx:alpine
    container_name: gesrentcar-web
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/storage/app/public:/var/www/storage/app/public
      - ./backend/public:/var/www/public
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy

volumes:
  pgdata:
