x-common-env: &common-env
  APP_ENV: production
  APP_DEBUG: "false"
  DB_CONNECTION: pgsql
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_DATABASE: ${DB_DATABASE:-vectoria}
  DB_USERNAME: ${DB_USERNAME:-admin}
  DB_PASSWORD: ${DB_PASSWORD:?ERROR}
  REDIS_HOST: redis
  REDIS_PASSWORD: ${REDIS_PASSWORD:?ERROR}
  QUEUE_CONNECTION: redis
  SESSION_DRIVER: redis
  CACHE_STORE: redis
  FRONTEND_URL: ${FRONTEND_URL:-https://vectoria.carbonick.com}
  STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
  STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
  STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vectoria-postgres
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-admin} -d $${POSTGRES_DB:-vectoria}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment:
      POSTGRES_DB: ${DB_DATABASE:-vectoria}
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: "${DB_PASSWORD:?Set DB_PASSWORD in .env}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vectoria-net

  # ─── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vectoria-redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    command: redis-server --appendonly yes --stop-writes-on-bgsave-error no --requirepass "${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}" --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    networks:
      - vectoria-net

  # ─── Backend PHP-FPM ───────────────────────────────────────────────────────────
  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectoria-php-fpm
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "pidof php-fpm > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 120s
    volumes:
      - storage_data:/var/www/storage
    environment:
      <<: *common-env
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost,localhost:3000,127.0.0.1,127.0.0.1:8000,::1,vectoria.carbonick.com}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vectoria-net

  # ─── Queue Worker ────────────────────────────────────────────────────────────
  queue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectoria-queue
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - storage_data:/var/www/storage
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vectoria-net

  # ─── Scheduler (Laravel Cron) ────────────────────────────────────────────────
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vectoria-scheduler
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    command: >
      sh -c "php artisan schedule:work --verbose --no-interaction"
    volumes:
      - storage_data:/var/www/storage
    environment:
      <<: *common-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vectoria-net

  # ─── Frontend (Next.js Standalone) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vectoria-frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-/api}
    # Copy _next/static/ into the shared volume so nginx can serve assets directly.
    # Next.js standalone server.js does NOT serve /_next/static/ itself.
    command: >-
      sh -c "cp -r /app/.next/static/. /app/static_shared/ && node server.js"
    volumes:
      - nextjs_static:/app/static_shared
    depends_on:
      php-fpm:
        condition: service_healthy
    networks:
      - vectoria-net

  # ─── Nginx (Reverse Proxy & Static Server) ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: vectoria-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend:/var/www:ro
      - storage_data:/var/www/storage:ro
      # Serve Next.js static assets directly (no proxy RTT, correct 200 responses)
      - nextjs_static:/var/nextjs_static:ro
    depends_on:
      frontend:
        condition: service_healthy
      php-fpm:
        condition: service_healthy
    networks:
      - vectoria-net

  # ─── Caddy (Auto TLS - Optional) ──────────────────────────────────────────────
  # Uncomment this service and set DOMAIN + EMAIL for automatic HTTPS
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: vectoria-caddy
  #   restart: unless-stopped
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 128M
  #         cpus: "0.25"
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   environment:
  #     - DOMAIN=${DOMAIN:-vectoria.carbonick.com}
  #   depends_on:
  #     nginx:
  #       condition: service_started
  #   networks:
  #     - vectoria-net

volumes:
  postgres_data:
  storage_data:
  redis_data:
  # Shared volume: frontend writes _next/static/ here; nginx reads it directly
  nextjs_static:
  # caddy_data:
  # caddy_config:

networks:
  vectoria-net:
    driver: bridge
